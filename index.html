<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Story Diagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<style>
:root,[data-theme="light"]{--bg:#f7f6f2;--surface:#fff;--border:rgba(40,37,29,.1);--text:#28251d;--text-muted:#7a7974;--text-faint:#bab9b4;--shadow:0 2px 12px rgba(40,37,29,.08);--req-hover:#f3f0ec;--req-border:rgba(40,37,29,.08);--selected:rgba(85,145,199,.18)}
[data-theme="dark"]{--bg:#171614;--surface:#1c1b19;--border:rgba(205,204,202,.1);--text:#cdccca;--text-muted:#797876;--text-faint:#5a5957;--shadow:0 2px 12px rgba(0,0,0,.3);--req-hover:#2d2c2a;--req-border:rgba(205,204,202,.08);--selected:rgba(85,145,199,.22)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px}header{display:flex;align-items:center;justify-content:space-between;max-width:1560px;margin:0 auto 18px;flex-wrap:wrap;gap:12px}.title-block h1{font-size:18px;font-weight:700}.title-block p{font-size:13px;color:var(--text-muted);margin-top:2px}.head-actions,.stack{display:flex;gap:8px;flex-wrap:wrap}.btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:Inter,sans-serif;cursor:pointer}.btn:hover{background:var(--req-hover)}.btn.primary{background:#006494;border-color:transparent;color:#fff}.legend{display:flex;gap:12px;flex-wrap:wrap;max-width:1560px;margin:0 auto 14px}.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 8px;border-radius:4px}.legend-item:hover{background:var(--req-hover)}.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}.legend-item.dimmed{opacity:.3}.toolbar{max-width:1560px;margin:0 auto 18px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px}.toolbar .hint,.status,.small{font-size:12px;color:var(--text-muted)}.toolbar label{font-size:12px;color:var(--text-muted);display:flex;gap:8px;align-items:center}.toolbar input[type=range]{width:120px}.toolbar select,.toolbar input[type=color],.toolbar input[type=text],.toolbar textarea{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:6px;padding:6px 8px;font:inherit}.toolbar input[type=text]{width:160px}.toolbar textarea{width:290px;height:64px;resize:vertical}.diagram-outer{max-width:1560px;margin:0 auto;position:relative;min-height:1280px}#svg-lines{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible}.diagram{display:grid;grid-template-columns:220px 1fr 220px;gap:0 32px;align-items:start}.actor-col{display:flex;flex-direction:column;gap:18px;padding-top:20px;position:relative}.actor-card{border-radius:10px;padding:0;border:1.5px solid;position:relative;transition:box-shadow 150ms,opacity 150ms;overflow:visible}.actor-inner{padding:12px 14px 14px}.drag-bar{height:22px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;padding:0 32px;cursor:grab;font-size:11px;color:var(--text-muted);user-select:none}.drag-bar:active{cursor:grabbing}.drag-dots{letter-spacing:3px;font-size:13px;opacity:.5}.actor-icon{font-size:22px;margin-bottom:6px;line-height:1}.actor-name{font-size:13px;font-weight:700;line-height:1.3}.actor-count{font-size:11px;margin-top:3px;opacity:.7}.actor-card.dimmed{opacity:.2}.actor-card.selected{box-shadow:0 0 0 3px var(--selected)}
.req-row.selected{background:rgba(0,100,148,.06)!important;position:relative}
.req-row.selected::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:#006494;border-radius:0 3px 3px 0;cursor:ns-resize}
[data-theme="dark"] .req-row.selected{background:rgba(85,145,199,.09)!important}
[data-theme="dark"] .req-row.selected::before{background:#5591c7}
.req-row.selected .req-id{color:#006494;font-weight:700}
[data-theme="dark"] .req-row.selected .req-id{color:#5591c7}
.req-row.drag-over-top{border-top:2px solid #006494!important}
.req-row.drag-over-bottom{border-bottom:2px solid #006494!important}.req-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:visible;position:relative}.req-box-header{padding:14px 20px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);background:var(--req-hover);display:flex;justify-content:space-between;align-items:center}.req-count-badge{font-size:11px;font-weight:700;background:var(--border);color:var(--text-muted);padding:2px 8px;border-radius:99px}.req-row{display:flex;align-items:flex-start;gap:12px;padding:11px 20px;border-bottom:1px solid var(--req-border);transition:background 150ms,opacity 150ms,box-shadow 150ms;position:relative;background:var(--surface)}.req-row:last-child{border-bottom:none}.req-row:hover,.req-row.hover-tools{background:var(--req-hover)}.req-row.dimmed{opacity:.2}.req-row.highlighted{background:var(--req-hover)}.req-id{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text-faint);min-width:58px;padding-top:1px;flex-shrink:0}.req-text{font-size:13px;line-height:1.45;flex:1}.req-tags{display:flex;gap:4px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;max-width:180px}.tag{font-size:10px;font-weight:600;padding:2px 6px;border-radius:99px;border:1px solid;white-space:nowrap}
.actor-delete-btn{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:999px;border:1px solid rgba(192,57,43,.3);background:rgba(192,57,43,.08);color:#c0392b;display:none;align-items:center;justify-content:center;font-size:13px;cursor:pointer;z-index:9;font-weight:700;line-height:1}
.actor-card:hover .actor-delete-btn{display:flex}
[data-theme="dark"] .actor-delete-btn{border-color:rgba(255,123,114,.3);background:rgba(255,123,114,.08);color:#ff7b72}
.notes-btn{width:24px;height:24px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);display:none;align-items:center;justify-content:center;font-size:13px;cursor:pointer;box-shadow:var(--shadow);z-index:8;flex-shrink:0}.notes-btn.has-notes{border-color:#f59e0b!important;color:#f59e0b!important;background:rgba(245,158,11,.08)!important;display:flex!important}.req-row.selected .notes-btn{display:flex}

.notes-panel{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;width:480px;max-width:95vw;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.18);overflow:hidden}
.notes-panel.open{display:block}
.notes-panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--req-hover)}
.notes-panel-header h3{font-size:14px;font-weight:700;margin:0}
.notes-panel-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);line-height:1;padding:2px 6px;border-radius:4px}
.notes-panel-close:hover{background:var(--border)}
.notes-panel-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.notes-panel-body label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.notes-panel-body textarea{width:100%;height:140px;resize:vertical;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font:inherit;font-size:13px;color:var(--text);background:var(--bg);line-height:1.5}
.notes-panel-body textarea:focus{outline:2px solid #006494;outline-offset:1px}
.notes-panel-footer{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--req-hover);justify-content:flex-end}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:999}
.overlay.open{display:block}
.note-indicator{display:inline-block;font-size:10px;color:#f59e0b;margin-left:4px;vertical-align:middle}
.connector{fill:none;stroke-width:1.8;stroke-linecap:round;opacity:.55;transition:opacity 200ms,stroke-width 200ms;pointer-events:stroke;cursor:pointer}.connector.active{opacity:1;stroke-width:2.8}.connector.dimmed{opacity:.06}.connector.selected{opacity:1;stroke-width:3.4}.editable{outline:none;border-radius:4px}.editable:focus{background:var(--req-hover)}.drag-handle{cursor:move}.tool-btn{position:absolute;width:24px;height:24px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;box-shadow:var(--shadow);z-index:8}.req-toolbox{position:absolute;right:-104px;top:50%;transform:translateY(-50%);display:none;gap:8px;z-index:9}.req-row:hover .req-toolbox,.req-row.hover-tools .req-toolbox{display:flex}.actor-card .tool-btn.link-only{top:10px;right:-36px}.floating{position:absolute!important;z-index:5}.link-mode{outline:2px dashed #7b61ff;outline-offset:4px}.json-area{max-width:1560px;margin:0 auto 16px;display:none;gap:10px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px}.json-area.show{display:flex}.danger{color:#c0392b}
</style>
</head>
<body>
<header>
  <div class="title-block"><h1>Use Case Diagram</h1><p>Diagram Editor · Click actors and requirements to edit · Drag the left bar to reorder</p></div>
  <div class="head-actions"><button class="btn" data-theme-toggle>☀ Light</button><button class="btn" id="resetBtn">Reset</button><button class="btn" id="undoBtn">Undo</button><button class="btn" id="redoBtn">Redo</button><button class="btn primary" id="saveBtn">Save Project</button><button class="btn" id="loadToggleBtn">Open Project</button></div>
</header>
<div class="legend" id="legend"></div>
<div class="toolbar">
  <div class="hint">Rename actors and all tags/legend entries sync automatically. Add a new actor to create a matching first requirement.</div>
  <label>Wave <input id="curveSlider" type="range" min="40" max="320" value="120"></label>
  <label>Bend <input id="bendSlider" type="range" min="-220" max="220" value="0"></label>
  <label>Line color <select id="lineColorSelect"></select></label>
  <label>Custom <input id="customColor" type="color" value="#7b61ff"></label>
  <label>New actor <input id="newActorName" type="text" placeholder="Actor name"></label>
  <label>Color <input id="newActorColor" type="color" value="#8b5cf6"></label>
  <button class="btn" id="addActorBtn">Add actor</button>
  <button class="btn" id="insertAboveBtn">Insert above</button>
  <button class="btn" id="insertBelowBtn">Insert below</button>
  <button class="btn" id="deleteSelectedBtn">Delete selected</button>
  <button class="btn" id="deleteLineBtn">Delete line</button>
  <div class="status" id="statusText">Select a box or line to edit.</div>
</div>
<input type="file" id="jsonFileInput" accept=".json" style="display:none">
<div class="diagram-outer" id="diagramOuter"><svg id="svg-lines"></svg><div class="diagram"><div class="actor-col" id="col-left"></div><div class="req-box" id="req-box"><div class="req-box-header"><span class="editable" contenteditable="true">Requirements</span><span class="req-count-badge" id="reqCountBadge">0</span></div></div><div class="actor-col" id="col-right"></div></div></div>
<div class="overlay" id="overlay"></div>
<div class="notes-panel" id="notesPanel">
  <div class="notes-panel-header"><h3 id="notesPanelTitle">Notes</h3><button class="notes-panel-close" id="notesPanelClose">×</button></div>
  <div class="notes-panel-body">
    <label>Requirement ID</label>
    <div id="notesReqId" style="font-size:13px;color:var(--text-muted)"></div>
    <label>Requirement text</label>
    <div id="notesReqText" style="font-size:13px;line-height:1.45"></div>
    <label>Notes / Acceptance criteria</label>
    <textarea id="notesTextarea" placeholder="Add notes, acceptance criteria, details..."></textarea>
  </div>
  <div class="notes-panel-footer"><button class="btn" id="notesPanelClose2">Cancel</button><button class="btn primary" id="notesSaveBtn">Save notes</button></div>
</div>
<script>
const svg=document.getElementById('svg-lines'),outer=document.getElementById('diagramOuter'),reqBox=document.getElementById('req-box'),statusText=document.getElementById('statusText');
const state={actors:[
{id:'actor-1',name:'Actor 1',short:'Actor 1',color:'#006494',bg:'#e6eef5',side:'left',icon:'👤',countText:'2 requirements'},
{id:'actor-2',name:'Actor 2',short:'Actor 2',color:'#437a22',bg:'#eaf3e6',side:'right',icon:'👥',countText:'2 requirements'}],connections:[],lineSettings:{},selectedId:'req-1',selectedLine:null,linkModeSource:null,history:[],future:[]};
const initialReqs=[
['Actor 1','REQ-01 — Requirement title here'],
['Actor 1','REQ-02 — Requirement title here'],
['Actor 2','REQ-03 — Requirement title here'],
['Actor 2','REQ-04 — Requirement title here']
];
function lighten(hex,a=.88){const n=hex.replace('#','');const r=parseInt(n.slice(0,2),16),g=parseInt(n.slice(2,4),16),b=parseInt(n.slice(4,6),16);const mix=v=>Math.round(255*a+v*(1-a));return `rgb(${mix(r)}, ${mix(g)}, ${mix(b)})`}
function actorById(id){return state.actors.find(a=>a.id===id)} function actorByName(name){return state.actors.find(a=>a.short===name||a.name===name||a.id===name)}
function setTheme(){const btn=document.querySelector('[data-theme-toggle]');const root=document.documentElement;let dark=localStorage.getItem('diagram-theme')?localStorage.getItem('diagram-theme')==='dark':true;root.setAttribute('data-theme',dark?'dark':'light');btn.textContent=dark?'☀ Light':'🌙 Dark';btn.onclick=()=>{dark=!dark;root.setAttribute('data-theme',dark?'dark':'light');btn.textContent=dark?'☀ Light':'🌙 Dark';localStorage.setItem('diagram-theme',dark?'dark':'light');setTimeout(drawLines,30)}}
function uuid(){return crypto.randomUUID?crypto.randomUUID():('id-'+Math.random().toString(36).slice(2))}
function pushHistory(){state.history.push(JSON.stringify(exportState()));if(state.history.length>50)state.history.shift();state.future=[]}
function undo(){if(!state.history.length)return;state.future.push(JSON.stringify(exportState()));importState(JSON.parse(state.history.pop()),false)}
function redo(){if(!state.future.length)return;state.history.push(JSON.stringify(exportState()));importState(JSON.parse(state.future.pop()),false)}
function exportState(){return{actors:state.actors,connections:state.connections,lineSettings:state.lineSettings,title:document.querySelector('.title-block h1').innerHTML,subtitle:document.querySelector('.title-block p').innerHTML,notes:Object.assign({},notesStore),header:reqBox.querySelector('.req-box-header .editable')?.innerHTML||reqBox.querySelector('.req-box-header').innerHTML,customColor:document.getElementById('customColor').value,items:[...document.querySelectorAll('.actor-card,.req-row')].map(el=>({id:el.id,cls:el.className,actor:el.dataset.actor||null,actors:el.dataset.actors||null,left:el.style.left||'',top:el.style.top||'',width:el.style.width||'',html:el.innerHTML,parent:el.closest('#col-left')?'left':el.closest('#col-right')?'right':'req'}))}}
function importState(obj,record=true){if(record)pushHistory();state.actors=obj.actors||state.actors;state.connections=obj.connections||[];state.lineSettings=obj.lineSettings||{};Object.keys(notesStore).forEach(k=>delete notesStore[k]);Object.assign(notesStore,obj.notes||{});document.querySelector('.title-block h1').innerHTML=obj.title||document.querySelector('.title-block h1').innerHTML;document.querySelector('.title-block p').innerHTML=obj.subtitle||document.querySelector('.title-block p').innerHTML;document.getElementById('customColor').value=obj.customColor||'#7b61ff';document.getElementById('col-left').innerHTML='';document.getElementById('col-right').innerHTML='';[...reqBox.querySelectorAll('.req-row')].forEach(e=>e.remove());const hdr=reqBox.querySelector('.req-box-header .editable');if(hdr)hdr.innerHTML=obj.header||'Requirements';else reqBox.querySelector('.req-box-header').innerHTML=obj.header||'Requirements';renderActors();obj.items.filter(i=>i.parent==='req').forEach(i=>{const row=document.createElement('div');row.className=i.cls;row.id=i.id;row.dataset.actors=i.actors||'';row.innerHTML=i.html;if(i.left){row.style.position='absolute';row.style.left=i.left;row.style.top=i.top;row.style.width=i.width;row.classList.add('floating')}reqBox.appendChild(row);attachReqEvents(row)});obj.items.filter(i=>i.parent==='left'||i.parent==='right').forEach(i=>{const col=document.getElementById(i.parent==='left'?'col-left':'col-right');const card=document.getElementById(i.id);if(card&&i.left){card.style.position='absolute';card.style.left=i.left;card.style.top=i.top;card.style.width=i.width;card.classList.add('floating')}});reindexRequirements();renderLegend();populateActorSelect();refreshNoteIndicators();drawLines()}
function renderLegend(){const legend=document.getElementById('legend');legend.innerHTML='';state.actors.forEach(a=>{const item=document.createElement('div');item.className='legend-item';item.dataset.actor=a.id;item.innerHTML=`<div class="legend-dot" style="background:${a.color}"></div>${a.name}`;item.onmouseenter=()=>setHighlight(a.id);item.onmouseleave=()=>setHighlight(null);legend.appendChild(item)})}
function populateActorSelect(){const sel=document.getElementById('lineColorSelect');sel.innerHTML='';state.actors.forEach(a=>{const o=document.createElement('option');o.value=a.id;o.textContent=a.name;sel.appendChild(o)});const custom=document.createElement('option');custom.value='custom';custom.textContent='Custom';sel.appendChild(custom)}
function renderActors(){state.actors.forEach(a=>{let col=document.getElementById(a.side==='left'?'col-left':'col-right');let card=document.createElement('div');card.className='actor-card drag-item';card.id=a.id;card.dataset.actor=a.id;card.style.background=a.bg;card.style.borderColor=a.color;card.style.color=a.color;card.innerHTML=`<div class="drag-bar" data-drag-handle><span class="drag-dots">⋮⋮⋮</span></div><div class="actor-inner"><div class="actor-icon editable" contenteditable="true">${a.icon}</div><div class="actor-name editable" contenteditable="true">${a.name}</div><div class="actor-count editable" contenteditable="true">${a.countText}</div><div class="small" style="margin-top:8px;display:flex;gap:8px;align-items:center"><span>Color</span><input class="actor-color" type="color" value="${a.color}" style="width:36px;padding:0;height:24px"><span class="small">Side</span><select class="actor-side"><option value="left" ${a.side==='left'?'selected':''}>Left</option><option value="right" ${a.side==='right'?'selected':''}>Right</option></select></div></div><button class="tool-btn link-only" data-link-source="${a.id}">⛓</button><button class="actor-delete-btn" title="Delete actor">×</button>`;col.appendChild(card);attachActorEvents(card)})}
function createReqRow(text='New requirement',actorId){const a=actorById(actorId)||state.actors[0];const row=document.createElement('div');row.className='req-row drag-item';row.dataset.actors=actorId;row.innerHTML=`<span class="req-id editable" contenteditable="true">REQ-00</span><span class="req-text editable drag-handle" contenteditable="true">${text}</span><div class="req-tags"><span class="tag" data-actor-tag="${actorId}" style="border-color:${a.color};color:${a.color};background:${lighten(a.color)}">${a.name}</span></div><button class="notes-btn" title="Notes">📝</button><div class="req-toolbox"><button class="tool-btn plus-btn" title="Add below">+</button><button class="tool-btn minus-btn danger" title="Delete">−</button><button class="tool-btn link-btn" data-link-source="" title="Link">⛓</button></div>`;attachReqEvents(row);return row}
function addInitialRequirements(){initialReqs.forEach(([actorName,text])=>{const actor=actorByName(actorName);if(!actor){console.warn('Actor not found:',actorName);return;}const row=createReqRow(text,actor.id);reqBox.appendChild(row)});reindexRequirements();const rows=[...reqBox.querySelectorAll('.req-row')];state.connections=rows.map((row,i)=>{const rowId=row.id;const actorId=(row.dataset.actors||'').split(' ')[0];const actor=actorById(actorId);if(!actor)return null;return{id:uuid(),from:actorId,to:rowId,side:actor.side==='left'?'left':'right',actor:actorId}}).filter(Boolean)}
function attachActorEvents(card){makeDraggable(card,'[data-drag-handle]');card.addEventListener('mouseenter',()=>setHighlight(card.dataset.actor));card.addEventListener('mouseleave',()=>setHighlight(null));card.addEventListener('click',e=>{if(e.target.closest('.tool-btn'))return;if(!e.target.closest('.editable')&&!e.target.closest('[data-drag-handle]'))setSelected(card.id)});card.querySelector('[data-link-source]').onclick=e=>{e.stopPropagation();startLinkMode(card.id)};
card.querySelector('.actor-delete-btn').onclick=e=>{e.stopPropagation();if(!confirm('Delete actor "'+actorById(card.id)?.name+'" and all its connections?'))return;pushHistory();state.connections=state.connections.filter(c=>c.from!==card.id&&c.to!==card.id);state.actors=state.actors.filter(a=>a.id!==card.id);card.remove();renderLegend();populateActorSelect();drawLines()};card.querySelectorAll('.editable').forEach(ed=>ed.addEventListener('input',()=>{const actor=actorById(card.id);actor.icon=card.querySelector('.actor-icon').innerHTML;actor.name=card.querySelector('.actor-name').innerText.trim()||actor.name;actor.countText=card.querySelector('.actor-count').innerText.trim()||actor.countText;syncActorNames(card.id);drawLines()}));card.querySelector('.actor-color').oninput=e=>{pushHistory();const actor=actorById(card.id);actor.color=e.target.value;actor.bg=lighten(e.target.value);card.style.borderColor=actor.color;card.style.color=actor.color;card.style.background=actor.bg;syncActorNames(card.id);renderLegend();populateActorSelect();drawLines()};card.querySelector('.actor-side').onchange=e=>{pushHistory();const actor=actorById(card.id);actor.side=e.target.value;document.getElementById(actor.side==='left'?'col-left':'col-right').appendChild(card);state.connections.forEach(c=>{if(c.from===actor.id)c.side=actor.side});drawLines()}}
function syncActorNames(actorId){const actor=actorById(actorId);document.querySelectorAll(`[data-actor-tag="${actorId}"]`).forEach(t=>{t.textContent=actor.name;t.style.borderColor=actor.color;t.style.color=actor.color;t.style.background=lighten(actor.color)});renderLegend();populateActorSelect()}

function enableRowReorder(){
  const rows=()=>[...reqBox.querySelectorAll('.req-row')];
  let draggingRow=null,placeholder=null,startY=0,rowH=0;

  reqBox.addEventListener('mousedown',e=>{
    const row=e.target.closest('.req-row');
    if(!row) return;
    // only drag via the left bar (::before pseudo — approximate: leftmost 8px when selected)
    const rect=row.getBoundingClientRect();
    const isLeftBar=row.classList.contains('selected')&&(e.clientX-rect.left)<10;
    if(!isLeftBar) return;
    e.preventDefault();
    draggingRow=row;
    startY=e.clientY;
    rowH=row.offsetHeight;
    row.style.opacity='.45';
    placeholder=document.createElement('div');
    placeholder.style.cssText=`height:${rowH}px;background:rgba(0,100,148,.08);border:2px dashed #006494;border-radius:4px;margin:0`;
    row.insertAdjacentElement('afterend',placeholder);
  });

  window.addEventListener('mousemove',e=>{
    if(!draggingRow) return;
    const allRows=rows().filter(r=>r!==draggingRow&&!r.isSameNode(placeholder));
    rows().forEach(r=>{r.classList.remove('drag-over-top','drag-over-bottom')});
    let target=null,position='after';
    for(const r of allRows){
      const rect=r.getBoundingClientRect();
      const mid=rect.top+rect.height/2;
      if(e.clientY<mid){target=r;position='before';break}
      target=r;position='after';
    }
    if(placeholder) placeholder.remove();
    if(target){
      placeholder=document.createElement('div');
      placeholder.style.cssText=`height:${rowH}px;background:rgba(0,100,148,.08);border:2px dashed #006494;border-radius:4px;margin:0`;
      if(position==='before')target.insertAdjacentElement('beforebegin',placeholder);
      else target.insertAdjacentElement('afterend',placeholder);
    }
  });

  window.addEventListener('mouseup',e=>{
    if(!draggingRow) return;
    draggingRow.style.opacity='';
    if(placeholder){placeholder.replaceWith(draggingRow);placeholder=null;}
    reindexRequirements();
    setSelected(draggingRow.id);
    draggingRow=null;
    drawLines();
  });
}
function makeDraggable(el,handleSelector){const handle=el.querySelector(handleSelector)||el;let dragging=false,startX=0,startY=0,origX=0,origY=0;handle.addEventListener('mousedown',e=>{if(e.target.closest('.editable')&&!e.target.closest('[data-drag-handle]'))return;
  const rect=el.getBoundingClientRect();
  const outerRect=outer.getBoundingClientRect();
  const mouseOffsetX=e.clientX-rect.left;
  const mouseOffsetY=e.clientY-rect.top;
  // Reparent to outer so absolute coords are relative to it
  if(!outer.contains(el)||el.parentElement!==outer){
    const w=rect.width;
    outer.appendChild(el);
    el.style.width=w+'px';
  }
  el.style.position='absolute';
  el.style.left=(rect.left-outerRect.left)+'px';
  el.style.top=(rect.top-outerRect.top)+'px';
  el.classList.add('floating');
  el._mox=mouseOffsetX;
  el._moy=mouseOffsetY;
  dragging=true;
  setSelected(el.id);
  e.preventDefault();
});

document.getElementById('notesPanelClose').onclick=closeNotes;document.getElementById('notesPanelClose2').onclick=closeNotes;document.getElementById('notesSaveBtn').onclick=saveNotes;document.getElementById('overlay').onclick=closeNotes;document.addEventListener('keydown',e=>{
